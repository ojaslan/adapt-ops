name: Run with ADAPT-OPS Monitoring

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        id: tests
        run: |
          python -m pytest tests/ --tb=short 2>&1 | tee test-output.txt
        continue-on-error: true

      - name: Extract metrics
        id: metrics
        run: |
          python -c "
          import json
          import time
          import os
          
          # Parse test results and build metrics
          build_duration = int(os.environ.get('BUILD_DURATION_SECS', 120))
          test_pass_rate = 0.95  # Would parse from test output
          failure_rate = 0.05
          queue_depth = 1
          cpu_util = 0.6
          mem_util = 0.5
          deploy_success = 1.0
          flaky_tests = 0
          retry_count = 0
          
          metrics = {
              'build_duration_secs': build_duration,
              'test_pass_rate': test_pass_rate,
              'failure_rate': failure_rate,
              'queue_depth': queue_depth,
              'cpu_utilization': cpu_util,
              'memory_utilization': mem_util,
              'deploy_success_rate': deploy_success,
              'flaky_test_count': flaky_tests,
              'retry_count': retry_count
          }
          print(json.dumps(metrics))
          " > metrics.json
          
          cat metrics.json

      - name: Send metrics to ADAPT-OPS
        if: always()
        run: |
          METRICS=$(cat metrics.json)
          curl -X POST "http://localhost:8000/ingest" \
            -H "Content-Type: application/json" \
            -d "$METRICS" \
            || echo "ADAPT-OPS not available (development mode)"

      - name: Check ADAPT-OPS recommendations
        if: always()
        run: |
          curl "http://localhost:8000/system/health" | jq '.' || true

      - name: Fail if tests failed and no auto-heal
        if: failure() && steps.tests.outcome == 'failure'
        run: exit 1
