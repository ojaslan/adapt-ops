name: ADAPT-OPS CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Lint with basic checks
      run: |
        python -m py_compile api/*.py core/**/*.py
    
    - name: Run tests
      run: |
        pytest tests/ -v --tb=short
    
    - name: Run simulation
      run: |
        python simulate.py 2>&1 | head -50

  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Build and push Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/adapt-ops:latest
          ${{ secrets.DOCKER_USERNAME }}/adapt-ops:${{ github.sha }}
        cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/adapt-ops:buildcache
        cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/adapt-ops:buildcache,mode=max

  report-metrics:
    runs-on: ubuntu-latest
    if: always()
    
    steps:
    - name: Send workflow metrics to ADAPT-OPS
      run: |
        curl -X POST http://localhost:8000/webhook/github \
          -H "Content-Type: application/json" \
          -d '{
            "workflow_run": {
              "id": "${{ github.run_id }}",
              "conclusion": "${{ job.status }}",
              "run_started_at": "${{ github.event.workflow_run.run_started_at || github.event.created_at }}"
            },
            "repository": {
              "full_name": "${{ github.repository }}"
            }
          }' || true
