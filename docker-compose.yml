version: '3.8'

services:
  adapt-ops:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: adapt-ops
    ports:
      - "8000:8000"
    volumes:
      - adapt-ops-data:/app/.data
      - ./.env:/app/.env:ro
    environment:
      PYTHONUNBUFFERED: 1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  adapt-ops-data:
    driver: local
